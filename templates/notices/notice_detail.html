{% extends 'base.html' %}
{% block content %}
<div class="col-md-8 mx-auto">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-start">
            <h2 class="text-primary">{{ notice.title }}</h2>
            <span class="badge bg-secondary fs-6">{{ notice.category }}</span>
        </div>
        <small class="text-muted">By {{ notice.author.username }} · {{ notice.created_at|date:"d M Y, H:i" }}</small>
        <hr>
        <p class="lead">{{ notice.content }}</p>
        <div class="mt-3">
            <a href="/notices/" class="btn btn-outline-secondary">← Back</a>
            {% if notice.author == request.user %}
            <a href="/notices/{{ notice.pk }}/delete/" class="btn btn-danger ms-2">Delete</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
