{% extends 'base.html' %}
{% block content %}
<div class="col-md-7 mx-auto">
    <div class="card p-4">
        <h3 class="mb-3 text-primary">Post a Notice</h3>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                {% if field.html_name == 'content' %}
                <textarea name="{{ field.html_name }}" class="form-control" rows="5">{{ field.value|default:'' }}</textarea>
                {% elif field.html_name == 'category' %}
                <select name="{{ field.html_name }}" class="form-select">
                    <option value="general">General</option>
                    <option value="academic">Academic</option>
                    <option value="event">Event</option>
                    <option value="urgent">Urgent</option>
                </select>
                {% else %}
                <input type="text" name="{{ field.html_name }}"
                       class="form-control" value="{{ field.value|default:'' }}">
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Post Notice</button>
            <a href="/notices/" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
