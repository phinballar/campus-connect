{% extends 'base.html' %}
{% block content %}
<div class="col-md-6 mx-auto">
    <div class="card p-4">
        <h3 class="mb-3 text-primary">Create Chat Room</h3>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                <input type="text" name="{{ field.html_name }}"
                       class="form-control" value="{{ field.value|default:'' }}">
                <small class="text-muted">
                    {% if field.html_name == 'slug' %}Use lowercase letters and hyphens only. e.g. general-chat{% endif %}
                </small>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Create Room</button>
        </form>
    </div>
</div>
{% endblock %}
