{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">💬 Chat Rooms</h2>
    <a href="/chat/create/" class="btn btn-primary">+ New Room</a>
</div>
<div class="row g-3">
{% for room in rooms %}
<div class="col-md-4">
    <a href="/chat/{{ room.slug }}/" class="text-decoration-none">
        <div class="card p-3 h-100">
            <h5 class="text-primary">{{ room.name }}</h5>
            <p class="text-muted small mb-0">{{ room.description|default:"No description" }}</p>
        </div>
    </a>
</div>
{% empty %}
<p class="text-muted">No chat rooms yet. Create one!</p>
{% endfor %}
</div>
{% endblock %}
