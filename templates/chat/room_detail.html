{% extends 'base.html' %}
{% block content %}
<div class="col-md-8 mx-auto">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h5 class="mb-0">💬 {{ room.name }}</h5>
            <a href="/chat/" class="text-white text-decoration-none small">← All Rooms</a>
        </div>
        <div class="card-body" id="chat-log"
             style="height: 400px; overflow-y: auto; background: #f8f9fa;">
            {% for msg in chat_messages %}
            <div class="mb-2">
                <strong class="text-primary">{{ msg.author.username }}</strong>
                <span class="text-muted small ms-1">{{ msg.timestamp|date:"H:i" }}</span>
                <div>{{ msg.content }}</div>
            </div>
            {% endfor %}
        </div>
        <div class="card-footer">
            <div class="input-group">
                <input type="text" id="chat-input"
                       class="form-control" placeholder="Type a message...">
                <button class="btn btn-primary" id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const roomSlug = "{{ room.slug }}";
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/' + roomSlug + '/'
    );

    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');

    chatLog.scrollTop = chatLog.scrollHeight;

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const div = document.createElement('div');
        div.classList.add('mb-2');
        div.innerHTML = `
            <strong class="text-primary">${data.username}</strong>
            <span class="text-muted small ms-1">just now</span>
            <div>${data.message}</div>
        `;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    document.getElementById('send-btn').onclick = function() {
        const message = chatInput.value.trim();
        if (message) {
            chatSocket.send(JSON.stringify({ 'message': message }));
            chatInput.value = '';
        }
    };

    chatInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('send-btn').click();
        }
    });
</script>
{% endblock %}
